<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CryptoLife • Doodle Jump PRO • Работа • Админка</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; user-select: none; }
        body { background: radial-gradient(circle at 10% 20%, #0a0f1f, #03060c); margin: 0; min-height: 100vh; padding: 20px; color: #eef2ff; }
        .flex { display: flex; flex-wrap: wrap; gap: 24px; max-width: 1400px; margin: 0 auto; }
        .col { flex: 2; min-width: 280px; }
        .col-right { flex: 1.5; min-width: 300px; display: flex; flex-direction: column; gap: 24px; }
        .card { background: rgba(18, 28, 40, 0.8); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(255, 200, 80, 0.3); padding: 1.3rem 1.5rem; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .tap-area { background: radial-gradient(circle at 40% 35%, #2c3e2f, #0b1a1f); border-radius: 2rem; text-align: center; padding: 1.8rem; cursor: pointer; transition: 0.05s; margin: 20px 0; border: 2px solid #f5b042; }
        .tap-area:active { transform: scale(0.97); }
        .coin { font-size: 5rem; filter: drop-shadow(0 0 8px gold); transition: transform 0.1s; }
        button { background: #2a3a4e; border: none; color: white; font-weight: bold; border-radius: 3rem; padding: 8px 16px; cursor: pointer; transition: 0.1s; font-size: 0.85rem; }
        button.primary { background: #f0b90b; color: #0a0f1f; }
        button.danger { background: #b91c1c; }
        button.game-btn { background: #7c3aed; }
        input, select { background: #0f172fd9; border: 1px solid #334155; padding: 8px 14px; border-radius: 2rem; color: white; outline: none; }
        .crypto-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #2d3a60; padding: 10px 0; }
        .trend-up { color: #4ade80; } .trend-down { color: #f87171; }
        .admin-card { border-left: 5px solid #facc15; background: #0c1428e0; }
        .vip-badge { background: linear-gradient(145deg, #c98a1d, #a55f00); padding: 2px 12px; border-radius: 40px; }
        .jail-badge { background: #7f1a1a; }
        .work-panel { background: #10222b; border-radius: 1.5rem; padding: 1rem; margin-top: 0.8rem; }
        .quiz-buttons { display: flex; gap: 16px; justify-content: center; margin-top: 12px; }
        .quiz-buttons button { flex: 1; background: #2c4b5e; font-size: 1rem; padding: 12px; }
        .game-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .game-container { background: #000; border-radius: 32px; overflow: hidden; box-shadow: 0 0 0 3px #facc15; }
        canvas { display: block; margin: 0 auto; background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%); cursor: pointer; }
        .game-controls { display: flex; justify-content: center; gap: 20px; padding: 12px; background: #1e293b; flex-wrap: wrap; }
        .toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #111827dd; backdrop-filter: blur(8px); padding: 10px 24px; border-radius: 60px; z-index: 1000; font-weight: bold; pointer-events: none; transition: 0.2s; color: white; }
        @media (max-width: 800px) { .flex { flex-direction: column; } .quiz-buttons button { font-size: 0.8rem; padding: 8px; } .game-controls button { padding: 8px 12px; font-size: 0.9rem; } }
    </style>
</head>
<body>
<div id="root" class="flex"></div>
<div id="toast" class="toast" style="opacity:0">✨</div>

<script>
    // ======================== 10 КРИПТОВАЛЮТ ========================
    const CRYPTO = [
        { id: "btc", name: "Bitcoin", sym: "BTC", rub: 5300000, vol: 0.022 },
        { id: "eth", name: "Ethereum", sym: "ETH", rub: 285000, vol: 0.024 },
        { id: "sol", name: "Solana", sym: "SOL", rub: 6700, vol: 0.033 },
        { id: "ton", name: "TON", sym: "TON", rub: 395, vol: 0.03 },
        { id: "doge", name: "Dogecoin", sym: "DOGE", rub: 12.2, vol: 0.045 },
        { id: "xrp", name: "Ripple", sym: "XRP", rub: 53, vol: 0.028 },
        { id: "ada", name: "Cardano", sym: "ADA", rub: 30, vol: 0.03 },
        { id: "avax", name: "Avalanche", sym: "AVAX", rub: 2750, vol: 0.035 },
        { id: "matic", name: "Polygon", sym: "MATIC", rub: 66, vol: 0.032 },
        { id: "ltc", name: "Litecoin", sym: "LTC", rub: 7300, vol: 0.026 }
    ];

    // ======================== ГЕНЕРАТОР ВОПРОСОВ ========================
    const qPool = {
        common: ["Рискнуть или перестраховаться?", "Согласиться на сделку?", "Взяться за проект?", "Использовать информацию?", "Внедрять инновацию?"],
        hacker: ["Сообщить об уязвимости?", "Защищать сервер?", "Взломать аккаунт?", "Украсть код?", "Закрыть бэкдор?"],
        criminal: ["Идти коротким путём?", "Бежать или прятаться?", "Молчать в полиции?", "Уйти или устранить свидетеля?"],
        doctor: ["Рискнуть на операции?", "Указать на ошибку?", "Дать лекарства?", "Браться за сложную операцию?"],
        engineer: ["Закрыть мост?", "Оригинал или аналог?", "Сделать качественно?", "Тестировать материал?"],
        streamer: ["Забанить хейтера?", "Сменить контент?", "Отказаться от рекламы?", "Играть в новинку?"],
        trader: ["Купить на падении?", "Использовать плечо?", "Зафиксировать убыток?", "Довериться аналитике?"],
        miner: ["Вложиться в железо?", "Майнить соло?", "Продать оборудование?", "Скупать видеокарты?"],
        driver: ["Ехать коротким путём?", "Ночной рейс?", "Взять попутчика?", "Нарушить скоростной режим?"]
    };
    for(let p in qPool) while(qPool[p].length < 30) qPool[p].push(...qPool[p]);

    function getRandomQ(jobId) {
        let ans = [
            { optA: "Вариант А", optB: "Вариант Б", correct: "Вариант А", chance: 0.6, bonus: 150 },
            { optA: "Да", optB: "Нет", correct: "Да", chance: 0.5, bonus: 200 },
            { optA: "Согласиться", optB: "Отказаться", correct: "Отказаться", chance: 0.7, bonus: 180 },
            { optA: "Рискнуть", optB: "Не рисковать", correct: "Рискнуть", chance: 0.55, bonus: 220 }
        ];
        let a = ans[Math.floor(Math.random()*ans.length)];
        let pool = [...qPool.common, ...(qPool[jobId]||[])];
        let text = pool[Math.floor(Math.random()*pool.length)];
        return { text, optA: a.optA, optB: a.optB, correct: a.correct, chance: a.chance, bonus: a.bonus };
    }

    const JOBS = {
        hacker: { name: "🖥️ Хакер", salary: 480, q:()=>getRandomQ("hacker") },
        criminal: { name: "🔫 Преступник", salary: 620, q:()=>getRandomQ("criminal") },
        doctor: { name: "👨‍⚕️ Доктор", salary: 410, q:()=>getRandomQ("doctor") },
        engineer: { name: "🔧 Инженер", salary: 440, q:()=>getRandomQ("engineer") },
        streamer: { name: "🎥 Стример", salary: 520, q:()=>getRandomQ("streamer") },
        trader: { name: "📈 Трейдер", salary: 560, q:()=>getRandomQ("trader") },
        miner: { name: "⛏️ Майнер", salary: 500, q:()=>getRandomQ("miner") },
        driver: { name: "🚛 Дальнобойщик", salary: 470, q:()=>getRandomQ("driver") }
    };

    // ======================== ИГРОКИ ========================
    let players = {}, currentUser = null, pendingWork = null, cryptoPrices = {};
    function save() { localStorage.setItem("cryptov6", JSON.stringify(players)); }
    function load() {
        let raw = localStorage.getItem("cryptov6");
        if(raw) {
            players = JSON.parse(raw);
            for(let p in players) {
                let u = players[p];
                if(!u.crypto) u.crypto = {};
                CRYPTO.forEach(c => { if(u.crypto[c.id]===undefined) u.crypto[c.id]=0; });
                if(u.banned===undefined) u.banned=false;
                if(u.jail===undefined) u.jail=false;
                if(u.vip===undefined) u.vip=false;
                if(u.isAdmin===undefined) u.isAdmin=false;
                if(!u.job) u.job="hacker";
                u.totalEarn = u.totalEarn || u.rub;
                u.workAnswers = u.workAnswers || 0;
            }
        } else players = {};
        save();
    }
    function updatePrices() {
        CRYPTO.forEach(c => {
            let old = cryptoPrices[c.id]?.price || c.rub;
            let change = (Math.random()-0.48)*c.vol;
            let np = Math.max(old*(1+change), c.rub*0.2);
            cryptoPrices[c.id] = { price: np, change: change*100, trend: change>=0?"up":"down" };
        });
    }
    function getPrice(id) { return cryptoPrices[id]?.price || CRYPTO.find(c=>c.id===id)?.rub; }

    function triggerWork() {
        let u = players[currentUser];
        if(!u || u.banned || u.jail || u.isAdmin) return;
        pendingWork = { username: currentUser, salary: JOBS[u.job].salary, q: JOBS[u.job].q() };
        render();
    }
    function answer(selected) {
        if(!pendingWork) return;
        let ctx = pendingWork, u = players[ctx.username];
        if(!u || u.banned || u.jail) { pendingWork=null; render(); return; }
        let isCorrect = (selected === ctx.q.correct);
        let success = isCorrect && Math.random() <= ctx.q.chance;
        let earn = ctx.salary + (success ? ctx.q.bonus : 0);
        u.rub += earn; u.totalEarn += earn; u.workAnswers++; save();
        toast(success ? `✅ +${earn}₽ (бонус!)` : `⚠️ +${earn}₽`, !success);
        pendingWork = null; render();
    }
    setInterval(()=>{ if(currentUser && players[currentUser] && !players[currentUser].banned && !players[currentUser].jail && !players[currentUser].isAdmin) triggerWork(); }, 15000);

    function tap() {
        let u = players[currentUser];
        if(!u || u.banned || u.jail) { toast("Недоступно", true); return; }
        let gain = u.vip ? 14 : 8;
        u.rub += gain; u.totalEarn += gain; save();
        toast(`💰 +${gain}₽`, false);
        render();
    }

    function buy(id, amt) { let u=players[currentUser]; if(!u||u.banned||u.jail) return; let p=getPrice(id), cost=amt*p; if(u.rub>=cost&&amt>0){ u.rub-=cost; u.crypto[id]=(u.crypto[id]||0)+amt; toast(`Куплено ${amt.toFixed(5)} ${id}`,false); save(); render(); } else toast("Не хватает",true); }
    function sell(id, amt) { let u=players[currentUser]; if(!u||u.banned||u.jail) return; let have=u.crypto[id]||0; if(have>=amt&&amt>0){ u.crypto[id]-=amt; u.rub+=amt*getPrice(id); toast(`Продано ${amt.toFixed(5)} ${id}`,false); save(); render(); } else toast("Недостаточно",true); }
    function transferRub(to, amt) { let f=players[currentUser]; if(!f||f.banned||f.jail) return; let t=players[to]; if(!t) return toast("Нет игрока",true); if(f.rub>=amt&&amt>0){ f.rub-=amt; t.rub+=amt; save(); toast(`Перевод ${amt}₽ -> ${to}`,false); render(); } else toast("Недостаточно",true); }
    function transferCrypto(to, id, amt) { let f=players[currentUser]; if(!f||f.banned||f.jail) return; let t=players[to]; if(!t) return toast("Нет игрока",true); let have=f.crypto[id]||0; if(have>=amt&&amt>0){ f.crypto[id]-=amt; t.crypto[id]=(t.crypto[id]||0)+amt; save(); toast(`Переведено ${amt} ${id}`,false); render(); } else toast("Недостаточно",true); }
    function daily() { let last=localStorage.getItem(`d_${currentUser}`), now=Date.now(); if(last && now-parseInt(last)<86400000) return toast("Уже было",true); let u=players[currentUser], reward=450+(u.vip?300:0); u.rub+=reward; localStorage.setItem(`d_${currentUser}`,now); save(); toast(`🎁 +${reward}₽`,false); render(); }

    // АДМИНКА
    let adminTarget = "";
    function setTarget(t) { adminTarget = t; render(); }
    function banTarget() { if(players[currentUser]?.isAdmin && players[adminTarget]) { players[adminTarget].banned = !players[adminTarget].banned; toast(`${adminTarget} ${players[adminTarget].banned?"забанен":"разбанен"}`,false); save(); render(); } }
    function jailTarget(state) { if(players[currentUser]?.isAdmin && players[adminTarget]) { players[adminTarget].jail = state; toast(`${adminTarget} ${state?"в тюрьме":"свободен"}`,false); save(); render(); } }
    function vipTarget(state) { if(players[currentUser]?.isAdmin && players[adminTarget]) { players[adminTarget].vip = state; toast(`VIP ${state?"выдан":"снят"} у ${adminTarget}`,false); save(); render(); } }
    function giveRub(amt) { if(players[currentUser]?.isAdmin && players[adminTarget] && amt>0) { players[adminTarget].rub += amt; toast(`+${amt}₽ ${adminTarget}`,false); save(); render(); } }
    function giveCrypto(id, amt) { if(players[currentUser]?.isAdmin && players[adminTarget] && amt>0) { players[adminTarget].crypto[id] = (players[adminTarget].crypto[id]||0)+amt; toast(`+${amt} ${id} ${adminTarget}`,false); save(); render(); } }

    function register(login, pwd, job) { if(players[login]) return toast("Логин занят",true); let isAdmin = (login === "admin"); players[login] = { username:login, password:pwd, rub: isAdmin?999999:5000, crypto:{}, job, vip:false, banned:false, jail:false, totalEarn: isAdmin?999999:5000, workAnswers:0, isAdmin }; CRYPTO.forEach(c=>players[login].crypto[c.id]=0); if(isAdmin) players[login].crypto.btc = 1; save(); toast(`Аккаунт ${login} создан!`, false); return true; }
    function login(login, pwd) { let u = players[login]; if(u && u.password === pwd) { if(u.banned) return toast("Забанен", true); currentUser = login; pendingWork = null; adminTarget = login; render(); toast(`Добро пожаловать, ${login}`, false); return true; } toast("Неверный логин/пароль", true); return false; }
    function logout() { currentUser = null; render(); }
    function leader() { return Object.entries(players).map(([n,p])=>{ let total = p.rub; CRYPTO.forEach(c=>total += (p.crypto[c.id]||0)*getPrice(c.id)); return { name:n, total, vip:p.vip }; }).sort((a,b)=>b.total-a.total).slice(0,12); }

    // ======================== DOODLE JUMP PRO ========================
    let gameReq=null, canvas=null, ctx=null, gameActive=false;
    let dood = { x: 200, y: 300, w: 32, h: 32, vx: 0, vy: 0, angle: 0 };
    let platforms = [], boosts = [];
    let score = 0, rewardGiven = 0, W = 400, H = 600;
    let gyroX = 0, gyroMode = false;
    let rocketActive = false, rocketTimer = 0;

    if(window.DeviceOrientationEvent) {
        window.addEventListener("deviceorientation", (e)=> { if(gyroMode) gyroX = Math.min(Math.max(e.gamma || 0, -30), 30); });
    }

    function drawCoinWithFace(x, y, size, angle) {
        ctx.save();
        ctx.translate(x + size/2, y + size/2);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.arc(0, 0, size/2, 0, Math.PI*2);
        ctx.fillStyle = "#facc15";
        ctx.fill();
        ctx.strokeStyle = "#b8860b";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.arc(-size/5, -size/8, size/12, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(size/5, -size/8, size/12, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, size/6, size/8, 0, Math.PI);
        ctx.fill();
        ctx.restore();
    }

    function initGame() {
        if(gameReq) cancelAnimationFrame(gameReq);
        gameActive = true; score = 0; rewardGiven = 0; rocketActive = false;
        dood = { x: W/2-16, y: H-120, w: 32, h: 32, vx: 0, vy: 0, angle: 0 };
        platforms = [];
        // базовая платформа внизу
        platforms.push({ x: W/2-40, y: H-40, w: 80, h: 12, type: "normal" });
        for(let i=0;i<8;i++) platforms.push({ x: Math.random()*(W-70), y: H-120 - i*90, w: 65, h: 12, type: "normal" });
        boosts = [];
        gameLoop();
    }

    function gameLoop() {
        if(!gameActive) return;
        let move = gyroMode ? gyroX * 0.22 : dood.vx;
        dood.x += move;
        if(dood.x < 0) dood.x = 0;
        if(dood.x + dood.w > W) dood.x = W - dood.w;
        if(rocketActive) { dood.vy = -4; rocketTimer--; if(rocketTimer<=0) rocketActive=false; }
        else dood.vy += 0.5;
        dood.y += dood.vy;
        dood.angle += 0.2;
        
        let onPlat = false;
        for(let i=0;i<platforms.length;i++) {
            let p = platforms[i];
            if(dood.vy>0 && dood.y+dood.h <= p.y+8 && dood.y+dood.h+dood.vy >= p.y && dood.x+dood.w > p.x && dood.x < p.x+p.w) {
                dood.vy = -9;
                dood.y = p.y - dood.h;
                onPlat = true;
                if(p.type === "spring") dood.vy = -13;
                if(p.type === "coin") { score += 50; players[currentUser].rub += 50; save(); toast("🪙 +50₽ за монетку!", false); platforms.splice(i,1); }
                break;
            }
        }
        for(let i=0;i<boosts.length;i++) {
            let b = boosts[i];
            if(dood.x+dood.w > b.x && dood.x < b.x+b.w && dood.y+dood.h > b.y && dood.y < b.y+b.h) {
                if(b.type === "rocket") { rocketActive=true; rocketTimer=90; toast("🚀 РАКЕТА! Временный полёт!", false); }
                if(b.type === "spring") { dood.vy = -13; toast("🔷 ПРУЖИНКА!", false); }
                boosts.splice(i,1); i--;
            }
        }
        if(dood.y > H) { gameOver(); return; }
        if(dood.y < H/3) {
            let offset = H/3 - dood.y;
            dood.y = H/3;
            for(let p of platforms) p.y += offset;
            for(let b of boosts) b.y += offset;
            score += Math.floor(offset);
            // +1 рубль за метр
            let addPerMeter = Math.floor(offset);
            if(addPerMeter > 0 && players[currentUser]) { players[currentUser].rub += addPerMeter; players[currentUser].totalEarn += addPerMeter; save(); }
            let newReward = Math.floor(score/1000);
            if(newReward > rewardGiven) { let add = (newReward-rewardGiven)*1000; players[currentUser].rub += add; save(); toast(`🎮 +${add}₽ за ${Math.floor(score)} метров!`, false); rewardGiven = newReward; }
        }
        let highest = Math.min(...platforms.map(p=>p.y));
        if(highest > 80) {
            let r = Math.random();
            let type = "normal";
            if(r < 0.08) type = "spring";
            else if(r < 0.12) type = "coin";
            platforms.push({ x: Math.random()*(W-70), y: highest-85, w: 65, h: 12, type: type });
            if(Math.random()<0.06) boosts.push({ x: Math.random()*(W-50), y: highest-95, w: 40, h: 12, type: Math.random()<0.5?"rocket":"spring" });
        }
        platforms = platforms.filter(p => p.y < H+100);
        boosts = boosts.filter(b => b.y < H+100);
        
        if(ctx){
            ctx.clearRect(0,0,W,H);
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,W,H);
            for(let p of platforms) {
                if(p.type === "spring") { ctx.fillStyle = "#ffaa44"; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = "#cc8800"; ctx.fillRect(p.x+5, p.y-3, p.w-10, 5); }
                else if(p.type === "coin") { ctx.fillStyle = "#facc15"; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = "#b8860b"; ctx.fillRect(p.x+5, p.y+2, p.w-10, 8); }
                else { ctx.fillStyle = "#8B5A2B"; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = "#654321"; ctx.fillRect(p.x+3, p.y-2, p.w-6, 4); }
            }
            for(let b of boosts) {
                if(b.type === "rocket") { ctx.fillStyle = "#ff4444"; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = "#ff8888"; ctx.fillRect(b.x+5, b.y-5, b.w-10, 5); ctx.fillStyle = "#ffff00"; ctx.fillRect(b.x+10, b.y-8, 5, 8); }
                if(b.type === "spring") { ctx.fillStyle = "#55ff55"; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = "#00aa00"; ctx.fillRect(b.x+5, b.y-4, b.w-10, 4); }
            }
            drawCoinWithFace(dood.x, dood.y, dood.w, dood.angle);
            ctx.fillStyle = "#000"; ctx.font = "bold 18px monospace"; ctx.fillText(`Метры: ${Math.floor(score)}`, 10, 35);
            ctx.fillStyle = "#fff"; ctx.shadowBlur=0;
            if(rocketActive) { ctx.fillStyle = "#ff6600"; ctx.font = "bold 14px monospace"; ctx.fillText("🚀 РАКЕТА АКТИВНА!", W-120, 30); }
            if(gyroMode) ctx.fillText("🎮 НАКЛОН ТЕЛЕФОНА", 10, 65);
            else ctx.fillText("🎮 A/D или кнопки", 10, 65);
        }
        gameReq = requestAnimationFrame(gameLoop);
    }
    function gameOver() { gameActive=false; if(gameReq) cancelAnimationFrame(gameReq); toast(`Игра окончена! Метры: ${Math.floor(score)}`,false); document.getElementById("gameModal")?.remove(); render(); }
    function moveLeft() { if(!gyroMode && gameActive) dood.vx = -4.5; setTimeout(()=>{ if(gameActive && !gyroMode) dood.vx = 0; },100); }
    function moveRight() { if(!gyroMode && gameActive) dood.vx = 4.5; setTimeout(()=>{ if(gameActive && !gyroMode) dood.vx = 0; },100); }
    function toggleGyro() { gyroMode = !gyroMode; toast(gyroMode?"🎮 Наклон телефона включён":"🎮 Управление кнопками/клавишами",false); render(); }
    function closeGame() { gameActive=false; if(gameReq) cancelAnimationFrame(gameReq); document.getElementById("gameModal")?.remove(); render(); }
    function openGame() { if(!currentUser) return; if(document.getElementById("gameModal")) return; let modal = document.createElement("div"); modal.id="gameModal"; modal.className="game-modal"; modal.innerHTML = `<div class="game-container"><canvas id="gameCanvas" width="400" height="600"></canvas><div class="game-controls"><button id="leftBtn">◀ ЛЕВО</button><button id="rightBtn">ПРАВО ▶</button><button id="gyroBtn">🎮 НАКЛОН</button><button id="closeGame" class="danger">✖ ВЫЙТИ</button></div></div>`; document.body.appendChild(modal); canvas = document.getElementById("gameCanvas"); ctx = canvas.getContext("2d"); initGame(); document.getElementById("leftBtn")?.addEventListener("click", moveLeft); document.getElementById("rightBtn")?.addEventListener("click", moveRight); document.getElementById("gyroBtn")?.addEventListener("click", toggleGyro); document.getElementById("closeGame")?.addEventListener("click", closeGame); window.addEventListener("keydown", (e)=>{ if(!gameActive) return; if(e.code==="ArrowLeft"||e.code==="KeyA") { e.preventDefault(); if(!gyroMode) moveLeft(); } if(e.code==="ArrowRight"||e.code==="KeyD") { e.preventDefault(); if(!gyroMode) moveRight(); } }); }

    // ======================== ОТРИСОВКА ========================
    function render() {
        const root = document.getElementById("root");
        if(!currentUser) {
            root.innerHTML = `<div class="card" style="max-width:500px; margin:auto; text-align:center"><h2>🏦 CRYPTOLIFE</h2><input id="loginName" placeholder="Логин" autocomplete="off"/><br/><br/><input id="loginPass" type="password" placeholder="Пароль" autocomplete="off"/><br/><br/><button class="primary" id="doLogin">Войти</button><p><span id="showReg" style="color:#facc15; cursor:pointer">🔰 Нет аккаунта? Создать</span></p><div id="regForm" style="display:none; margin-top:12px"><input id="newLogin" placeholder="Логин" autocomplete="off"/><br/><br/><input id="newPass" type="password" placeholder="Пароль" autocomplete="off"/><br/><br/><select id="jobSelect">${Object.entries(JOBS).map(([id,j])=>`<option value="${id}">${j.name}</option>`).join('')}</select><br/><br/><button id="doReg" class="primary">Зарегистрироваться</button></div></div>`;
            document.getElementById("doLogin")?.addEventListener("click",()=>login(document.getElementById("loginName").value, document.getElementById("loginPass").value));
            document.getElementById("showReg")?.addEventListener("click",()=>document.getElementById("regForm").style.display="block");
            document.getElementById("doReg")?.addEventListener("click",()=>{ let l=document.getElementById("newLogin").value, p=document.getElementById("newPass").value, j=document.getElementById("jobSelect").value; if(register(l,p,j)) login(l,p); });
            return;
        }
        let u=players[currentUser], isAdmin=u.isAdmin, topList=leader();
        let cryptoHtml = CRYPTO.map(c=>{ let p=cryptoPrices[c.id]||{price:c.rub, change:0, trend:"up"}; return `<div class="crypto-row"><span><b>${c.sym}</b> ${c.name}</span><span>${p.price.toFixed(2)}₽ ${p.trend==="up"?"📈":"📉"} <span class="${p.trend==="up"?"trend-up":"trend-down"}">${p.change>0?'+':''}${p.change.toFixed(1)}%</span></span><span><input id="a_${c.id}" size="5" type="number" step="0.001" value="0.01"/><button onclick="buy('${c.id}', parseFloat(document.getElementById('a_${c.id}').value))">Купить</button><button onclick="sell('${c.id}', parseFloat(document.getElementById('a_${c.id}').value))">Продать</button><button onclick="let t=prompt('Игрок'); if(t) transferCrypto(t,'${c.id}',parseFloat(document.getElementById('a_${c.id}').value))">Перевод</button></span></div>`; }).join('');
        let workHtml = ""; if(pendingWork && pendingWork.username===currentUser && !u.isAdmin) { let q=pendingWork.q; workHtml = `<div class="work-panel"><h3>💼 ${JOBS[u.job].name}</h3><p>❓ ${q.text}</p><div class="quiz-buttons"><button onclick="answer('${q.optA.replace(/'/g,"\\'")}')">✅ ${q.optA}</button><button onclick="answer('${q.optB.replace(/'/g,"\\'")}')">✅ ${q.optB}</button></div><small>База ${pendingWork.salary}₽ + бонус ${q.bonus}₽</small></div>`; } else if(!u.isAdmin && !u.banned && !u.jail) workHtml = `<div class="work-panel"><h3>💼 Работа</h3><small>Каждые 15 сек — новый вопрос. Отвечай кнопками!</small></div>`; else if(u.isAdmin) workHtml = `<div class="work-panel"><h3>👑 Администратор</h3><small>У вас нет работы, вы управляете миром</small></div>`;
        let adminHtml = ""; if(isAdmin) { let userList = Object.keys(players).map(n=>`<option value="${n}" ${adminTarget===n?"selected":""}>${n}</option>`).join(''); adminHtml = `<div class="card admin-card"><h3>⚡ АДМИН-ПАНЕЛЬ</h3><select id="adminSelect">${userList}</select><button onclick="setTarget(document.getElementById('adminSelect').value)">Выбрать игрока</button><div style="margin-top:12px"><b>Цель: ${adminTarget || "не выбран"}</b></div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px"><input id="rubAmt" placeholder="сумма" size="6"/><button onclick="giveRub(parseFloat(document.getElementById('rubAmt').value))">Выдать рубли</button><input id="cryptoAmt" placeholder="кол-во" size="5"/><select id="cryptoSel">${CRYPTO.map(c=>`<option value="${c.id}">${c.sym}</option>`).join('')}</select><button onclick="giveCrypto(document.getElementById('cryptoSel').value, parseFloat(document.getElementById('cryptoAmt').value))">Выдать крипту</button><button onclick="banTarget()">🚫 Бан/разбан</button><button onclick="jailTarget(true)">🚔 Посадить</button><button onclick="jailTarget(false)">🔓 Освободить</button><button onclick="vipTarget(true)">💎 Выдать VIP</button><button onclick="vipTarget(false)">❌ Снять VIP</button></div></div>`; }
        root.innerHTML = `<div class="col"><div class="card"><div><h2>👤 ${currentUser} ${u.vip?'💎 VIP':''} ${u.jail?'🚔 ТЮРЬМА':''}</h2><div style="font-size:2rem;color:#FFD966">${u.rub.toFixed(2)} ₽</div><small>Капитал: ≈ ${topList.find(l=>l.name===currentUser)?.total.toFixed(2)||0}₽</small><button onclick="daily()">🎁 Ежедневно</button> <button onclick="logout()">Выйти</button> <button class="game-btn" onclick="openGame()">🎮 Doodle Jump Pro</button></div><div class="tap-area" id="tapZone"><div class="coin">🪙💰</div><h3>ТАПАЙ МОНЕТУ</h3><span>+${u.vip?14:8}₽</span></div>${workHtml}</div><div class="card"><h3>📊 КРИПТОБИРЖА</h3>${cryptoHtml}<div style="margin-top:12px"><input id="trTo" placeholder="игрок"/><input id="trAmt" placeholder="сумма"/><button onclick="transferRub(document.getElementById('trTo').value, parseFloat(document.getElementById('trAmt').value))">Перевести рубли</button></div></div></div><div class="col-right">${adminHtml}<div class="card"><h3>🏆 ТОП КАПИТАЛ</h3>${topList.map(l=>`<div>${l.name} ${l.vip?'💎':''}: ${l.total.toFixed(2)}₽</div>`).join('')}</div><div class="card"><h3>📜 ПРАВИЛА</h3><p>✅ Тапай + работа (кнопки)<br>💰 Крипта с живыми курсами<br>🎮 Doodle Jump: A/D или стрелки / наклон телефона<br>👑 Админ: при регистрации логин "admin"<br>🔷 Пружинки/ракеты/монетки</p></div></div>`;
        document.getElementById("tapZone")?.addEventListener("click", tap);
        if(isAdmin && document.getElementById("adminSelect")) document.getElementById("adminSelect").value = adminTarget;
    }
    function toast(msg, err) { let t=document.getElementById("toast"); t.style.opacity="1"; t.innerText=msg; t.style.background=err?"#b91c1c":"#111827dd"; setTimeout(()=>t.style.opacity="0",2000); }
    window.buy=buy; window.sell=sell; window.transferRub=transferRub; window.transferCrypto=transferCrypto;
    window.setTarget=setTarget; window.banTarget=banTarget; window.jailTarget=jailTarget; window.vipTarget=vipTarget; window.giveRub=giveRub; window.giveCrypto=giveCrypto;
    window.answer=answer; window.openGame=openGame;
    load(); updatePrices(); setInterval(()=>{ updatePrices(); render(); }, 13000);
    render();
</script>
</body>
</html>
